app = "vault-api"
primary_region = "fra"   # Frankfurt — EU jurisdiction, not US

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "3000"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = false   # keep warm for low-latency WebSocket
  auto_start_machines  = true
  min_machines_running = 2       # always 2 instances for redundancy

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 5000
    soft_limit = 4000

[[vm]]
  cpu_kind = "shared"
  cpus     = 2
  memory   = "1gb"

[[services.ports]]
  port     = 443
  handlers = ["tls", "http"]

[[services.ports]]
  port     = 80
  handlers = ["http"]

  [services.ports.force_https]
    enabled = true

# WebSocket support
[[services.tcp_checks]]
  interval    = "15s"
  timeout     = "2s"
  grace_period = "5s"

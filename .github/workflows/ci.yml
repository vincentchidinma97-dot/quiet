name: Vault CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Shared package ──────────────────────────────────────────────────────────
  # Disabled until packages/shared work resumes — re-enable by removing continue-on-error
  shared:
    name: Shared package
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: cd packages/shared && npx tsc --noEmit

  # ── API server ──────────────────────────────────────────────────────────────
  api:
    name: API server
    runs-on: ubuntu-latest
    needs: shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: cd apps/api && npx tsc --noEmit
      - name: Run API tests
        run: cd apps/api && npm test
        if: hashFiles('apps/api/tests/**/*.test.ts') != ''

  # ── Smart contracts ─────────────────────────────────────────────────────────
  # Disabled until packages/contracts work resumes — re-enable by removing continue-on-error
  contracts:
    name: Smart contracts
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - run: cd packages/contracts && npm ci
      - name: Compile contracts
        run: cd packages/contracts && forge build
      - name: Run Foundry tests
        run: cd packages/contracts && forge test -vv
      - name: Check contract sizes
        run: cd packages/contracts && forge build --sizes

  # ── Mobile lint ─────────────────────────────────────────────────────────────
  mobile-lint:
    name: Mobile TypeScript check
    runs-on: ubuntu-latest
    needs: shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: cd apps/mobile && npx tsc --noEmit

  # ── Deploy API to Fly.io ─────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [api, contracts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy --app vault-api --config apps/api/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
